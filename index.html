<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Namzeforge</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta property="og:url" content="https://www.namzeforge.com/" />
    <meta property="fb:app_id" content="1494250871810740" />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://www.namzeforge.com/favicon.ico"
    />
    <meta property="og:title" content="Catherine Sichone Portfolio" />
    <meta
      property="og:description"
      content="Explore my work as a visionary Software Engineer."
    />
    <style>
      nav {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 1000;
      }
      nav a {
        margin: 0 15px; 
        color: white;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      nav a:hover {
        color: #cbb293; 
      }
      #root {
        padding-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav>
      <!-- X (Twitter) - Now leading the social lineup -->
      <a
        href="https://x.com/NamzeforgeHQ"
        target="_blank"
        rel="noopener noreferrer"
        title="Follow on X"
      >
        <i class="fab fa-x-twitter"></i>
      </a>

      <!-- Facebook -->
      <a
        href="https://www.facebook.com/NamzeForge/"
        target="_blank"
        rel="noopener noreferrer"
        title="Facebook"
      >
        <i class="fab fa-facebook-f"></i>
      </a>

      <!-- Instagram -->
      <a
        href="https://www.instagram.com/namzeforge/"
        target="_blank"
        rel="noopener noreferrer"
        title="Instagram"
      >
        <i class="fab fa-instagram"></i>
      </a>

      <!-- LinkedIn -->
      <a
        href="https://www.linkedin.com/in/catherine-namonje-4ab353203/"
        target="_blank"
        rel="noopener noreferrer"
        title="LinkedIn"
      >
        <i class="fab fa-linkedin-in"></i>
      </a>
    </nav>
    <div id="root">
      <div style="position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;">
        <div style="font-size:clamp(3rem,10vw,8rem);font-weight:900;letter-spacing:-0.02em;background:linear-gradient(90deg,#da6d20,#fdba74,#da6d20);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">NAMZEFORGE</div>
        <div style="margin-top:1.5rem;color:#94a3b8;font-size:1rem;letter-spacing:0.4em;text-transform:uppercase;">Digital Solutions</div>
        <div style="margin-top:2.5rem;width:48px;height:48px;border:3px solid #da6d20;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
